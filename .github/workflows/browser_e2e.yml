name: Browser E2E

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  chromium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
        with:
          cache: true
      - run: bundle install
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: mise run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: browser-e2e-results
          path: test-results/
          if-no-files-found: ignore
