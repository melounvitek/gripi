[tools]
node = "22.22.1"
go = "1.26.5"

[tasks.setup]
description = "Install dependencies and create local gateway config"
run = "bin/setup"

[tasks.start]
description = "Run the web gateway in production mode"
run = "bin/start"

[tasks.dev]
description = "Run the Go web gateway in development mode on port 4567"
run = "APP_ENV=development GRIPI_BIND_HOST=127.0.0.1 go run ./cmd/gripi"

[tasks.test]
description = "Run the Go gateway, frontend, shell script, and Pi extension tests"
run = "go test ./... && npm run frontend:check && npm run scripts:check && npm run pi-extension:check"

[tasks.test-go]
description = "Run the Go gateway tests"
run = "go test ./..."

[tasks.frontend-check]
description = "Run native Node frontend and demo tests plus JavaScript syntax checks"
run = "npm run frontend:check"

[tasks.scripts-check]
description = "Run shell launcher, setup, password wrapper, and desktop installer tests"
run = "npm run scripts:check"

[tasks.pi-extension-check]
description = "Run the native Node Pi tree extension bridge test"
run = "npm run pi-extension:check"

[tasks.fake-pi-check]
description = "Run deterministic fake-Pi RPC support tests"
run = "npm run fake-pi:check"

[tasks.build-go]
description = "Build the Go gateway"
run = "mkdir -p tmp && go build -o tmp/gripi ./cmd/gripi"

[tasks.benchmark-go]
description = "Measure the Go gateway under the seeded memory workload"
run = "node scripts/benchmark_gateway_memory.mjs"

[tasks.e2e]
description = "Run the managed browser E2E contract suite"
run = "npm run test:e2e"

[tasks.desktop]
description = "Run the Electron desktop shell"
run = "npm run desktop"

[tasks.desktop-check]
description = "Run Electron desktop shell checks"
run = "npm run desktop:check"

[tasks.desktop-dist-linux]
description = "Build Linux Electron desktop shell packages"
run = "npm run dist:linux"

[tasks.desktop-dist-mac]
description = "Build macOS Electron desktop shell packages"
run = "npm run dist:mac"

[tasks.desktop-install]
description = "Build and install the Electron desktop shell for the current user"
run = "bin/install-desktop"
