{{define "index.html"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gripi</title>
  <link rel="icon" href="/app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#18181e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Gripi">
  <link rel="stylesheet" href="/assets/app.css?v={{.GatewayInstanceID}}">
</head>
<body class="{{if .SessionOnly}}session-only{{end}}" data-browser-access-enabled="{{.BrowserAccessEnabled}}" data-workspace-access-enabled="{{.WorkspaceAccessEnabled}}" data-gateway-instance-id="{{.GatewayInstanceID}}" data-home-dir="{{.Home}}">
  <div class="app-shell">
    {{if not .SessionOnly}}<input type="checkbox" class="mobile-session-toggle" id="mobile-session-toggle">{{template "sidebar" .}}<label for="mobile-session-toggle" class="mobile-sidebar-backdrop" aria-label="Hide sessions"></label>{{end}}
    {{template "conversation" .}}
  </div>
  {{template "new_session_modal" .}}
  {{template "fork_session_modal" .}}
  {{template "model_settings_modal" .}}
  {{template "extension_ui_modal" .}}
  <div class="session-switch-overlay" role="status" aria-live="polite" aria-label="Loading"><div class="session-switch-indicator"><span class="session-switch-spinner" aria-hidden="true"></span> Loading…</div></div>
  <div class="browser-access-overlay" data-browser-access-overlay aria-live="polite"><div class="browser-access-card"><div class="browser-access-title" data-browser-access-title></div><div class="browser-access-meta" data-browser-access-meta></div><div class="browser-access-actions"><button class="secondary" type="button" data-browser-access-deny>Deny</button><button type="button" data-browser-access-allow>Allow</button></div></div></div>
  <div class="browser-access-overlay" data-workspace-access-overlay aria-live="polite"><div class="browser-access-card"><div class="browser-access-title" data-workspace-access-title></div><div class="browser-access-meta" data-workspace-access-meta></div><div class="browser-access-actions"><button class="secondary" type="button" data-workspace-access-deny>Deny</button><button type="button" data-workspace-access-allow>Allow</button></div></div></div>
  <script type="module" src="/assets/app.js?v={{.GatewayInstanceID}}"></script>
</body>
</html>{{end}}
